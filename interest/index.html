---
layout: ieeevr-default
title: "Express Your Interest"
title_separator: "|"
published: true
---

<style>
  /* Force the left column to full width on this page */
  .page__content .row { display: block; }
  .page__content .column.left  { width: 100%; float: none; padding: 0; }
  .page__content .column.center,
  .page__content .column.right { display: none; }

  /* Full-width rectangle */
  .interest-box {
    display: flex;
    width: 100%;
    min-height: 600px;
    border: 1px solid #dde3ec;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  /* LEFT half — no padding so image fills edge-to-edge */
  .interest-left {
    flex: 0 0 46%;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    overflow: hidden;
  }

  /* Image fills the full top of the left panel */
  .interest-left .conf-logo {
    width: 100%;
    display: block;
    height: auto;
    flex-shrink: 0;
  }

  /* Text + countdown below the image */
  .interest-left-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem 2rem 2rem;
    text-align: center;
    box-sizing: border-box;
  }

  .interest-left-body h1 {
    font-size: 2rem;
    font-weight: 900;
    color: #0b2a6b;
    margin: 0 0 0.4rem;
    line-height: 1.1;
  }

  .conf-dates {
    font-size: 1rem;
    font-weight: 700;
    color: #007a8c;
    margin: 0 0 0.2rem;
  }

  .conf-location {
    font-size: 0.85rem;
    font-weight: 600;
    color: #0b2a6b;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    margin: 0 0 1.4rem;
  }

  /* Days — centred, full width of body */
  .countdown-days-row {
    width: 100%;
    display: flex;
    justify-content: center;
    margin-bottom: 0.5rem;
  }

  .countdown-days-row .countdown-unit {
    width: 120px;
  }

  .countdown-days-row .number {
    font-size: 3.2rem;
  }

  /* HMS row */
  .countdown-hms-row {
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 0;
  }

  .countdown-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 80px;
  }

  .countdown-unit .number {
    font-size: 2.2rem;
    font-weight: 900;
    font-variant-numeric: tabular-nums;
    font-family: monospace;
    color: #0b2a6b;
    line-height: 1;
    text-align: center;
    display: block;
    width: 100%;
  }

  .countdown-unit .label {
    font-size: 0.58rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #0b2a6b;
    opacity: 0.65;
    margin-top: 0.25rem;
    text-align: center;
  }

  /* RIGHT half */
  .interest-right {
    flex: 1 1 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #fff;
  }

  .interest-right iframe {
    width: 100% !important;
    flex: 1;
    min-height: 600px;
    border: none;
    display: block;
  }

  @media (max-width: 700px) {
    .interest-box { flex-direction: column; }
    .interest-left { border-right: none; border-bottom: 1px solid #dde3ec; }
    .interest-right iframe { min-height: 560px; }
  }
</style>

<div class="interest-box">

  <!-- LEFT -->
  <div class="interest-left">

    <!-- Image fills full top edge-to-edge -->
    <img class="conf-logo" src="/assets/images/backgrounds/VR2027.webp" alt="IEEE VR 2027">

    <!-- Text + countdown -->
    <div class="interest-left-body">
      <h1>IEEE <span style="color:#007a8c;">VR</span> 2027</h1>
      <p class="conf-dates">{{ site.interest.conference_dates_display }}</p>
      <p class="conf-location">{{ site.interest.conference_location }}</p>

      <!-- Days: own centered line -->
      <div class="countdown-days-row">
        <div class="countdown-unit">
          <span class="number" id="cd-days">--</span>
          <span class="label">days</span>
        </div>
      </div>

      <!-- Hours / Minutes / Seconds -->
      <div class="countdown-hms-row">
        <div class="countdown-unit">
          <span class="number" id="cd-hours">--</span>
          <span class="label">hours</span>
        </div>
        <div class="countdown-unit">
          <span class="number" id="cd-minutes">--</span>
          <span class="label">minutes</span>
        </div>
        <div class="countdown-unit">
          <span class="number" id="cd-seconds">--</span>
          <span class="label">seconds</span>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT: Google Form -->
  <div class="interest-right">
    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLScjbcwskn_Zdk7d6-4baDb2v3dl7AFvXDWvFEelU7ObSIiUYg/viewform?embedded=true" width="640" height="1063" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
  </div>

</div>

<script>
  var targetDate = new Date("{{ site.interest.conference_date }}T00:00:00");
  function pad(n) { return String(n).padStart(2, "0"); }
  function updateCountdown() {
    var diff = targetDate - new Date();
    if (diff <= 0) {
      ["cd-days","cd-hours","cd-minutes","cd-seconds"]
        .forEach(function(id){ document.getElementById(id).textContent = "00"; });
      return;
    }
    var s  = Math.floor(diff / 1000);
    var sc = s % 60;
    var m  = Math.floor(s / 60);
    var mc = m % 60;
    var h  = Math.floor(m / 60);
    var hc = h % 24;
    var d  = Math.floor(h / 24);
    document.getElementById("cd-days").textContent    = pad(d);
    document.getElementById("cd-hours").textContent   = pad(hc);
    document.getElementById("cd-minutes").textContent = pad(mc);
    document.getElementById("cd-seconds").textContent = pad(sc);
  }
  updateCountdown();
  setInterval(updateCountdown, 1000);
</script>
